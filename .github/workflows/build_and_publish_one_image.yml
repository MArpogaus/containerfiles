#ref: https://github.com/secureblue/secureblue/blob/01b1830ee07cbafd15e5558f3a7e58b59143c4fa/.github/workflows/build-one-recipe.yml
name: Build and publish a container image
permissions: {}
on:
  workflow_call:
    inputs:
      image-name:
        type: string
        required: true
      containerfile:
        type: string
        required: true
      context:
        type: string
        required: false
        default: .
      platform:
        type: string
        required: true
      slsa-verify-source:
        type: string
        required: false
        default: ''
    secrets:
      SIGNING_SECRET:
        required: true

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build_and_push_image:
    runs-on: ubuntu-latest
    outputs:
      FULL_IMAGE_REF: ${{ steps.build_image.outputs.image-with-tag }}
      IMAGE_DIGEST: ${{ steps.push.outputs.digest }}
    permissions:
      contents: read # Needed to pull the repo for the build
      packages: write # Needed to publish images
      id-token: write # Needed for token generation for signing
    steps:
      # https://github.com/macbre/push-to-ghcr/issues/12
    - name: Lowercase Registry
      id: registry_case
      uses: ASzc/change-string-case-action@ecd1412d078f2e06e9eedcbaa6fcd988151c3f82 # v8
      with:
        string: ${{ env.REGISTRY }}

      # Ensure that there is disk space available
    - name: Maximize build space
      uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
      with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
        tool-cache: true
          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
        android: true
        dotnet: true
        haskell: true
        large-packages: false
        docker-images: false
        swap-storage: true

      # Checkout repo and build image
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Verify base image provenance
    - name: Install slsa-verifier
      if: ${{ inputs.slsa-verify-source != '' }}
      uses: slsa-framework/slsa-verifier/actions/installer@ea584f4502babc6f60d9bc799dbbb13c1caa9ee6 # v2.7.1
    - name: Verify base image provenance
      shell: bash
      if: ${{ inputs.slsa-verify-source != '' }}
      env:
        CONTAINERFILE: ${{ inputs.containerfile }}
        SOURCE_URI: ${{ inputs.slsa-verify-source }}
      run: |
        set -exuo pipefail

        # Install crane
        CRANE_VERSION=v0.20.7
        CRANE_OS=Linux
        CRANE_ARCH=x86_64
          curl -fLsS --retry 5 \
            -o 'go-containerregistry.tar.gz' "https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/go-containerregistry_${CRANE_OS}_${CRANE_ARCH}.tar.gz" \
            -o 'provenance.intoto.jsonl' "https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/multiple.intoto.jsonl"
        slsa-verifier verify-artifact go-containerregistry.tar.gz --provenance-path provenance.intoto.jsonl --source-uri github.com/google/go-containerregistry --source-tag "${CRANE_VERSION}"
        tar -zxvf go-containerregistry.tar.gz -C /usr/local/bin/ crane

        BASE_IMAGE=${BASE_IMAGE:-$(grep -P '^FROM ([a-z.-]+(/|:\w+))+' ${CONTAINERFILE} | cut -d ' ' -f 2)}
        DIGEST=$(crane digest "${BASE_IMAGE}")
        slsa-verifier verify-image --source-uri $SOURCE_URI "${BASE_IMAGE}@${DIGEST}"

      # Enable caching for podman
    - name: cache podman
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.local/share/containers
        key: podman

      # Build conatiner image
    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
      with:
        images: ${{ env.REGISTRY }}/${{ inputs.image-name }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=latest,enable={{is_default_branch}}
          type=raw,value={{branch}}-{{sha}},enable=${{ github.event_name != 'pull_request' }}
          type=raw,value={{branch}}-{{date 'YYYYMMDD-HHmmss'}},enable=${{ github.event_name != 'pull_request' }}
    - name: Build Image
      id: build_image
      uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2.13
      with:
        containerfiles: ${{ inputs.containerfile }}
        context: ${{ inputs.context }}
        platforms: ${{ inputs.platform }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        oci: true
        layers: true
          #extra-args: |
          #  --cache-to=${{ steps.registry_case.outputs.lowercase }}/cache
          #  --cache-from=${{ steps.registry_case.outputs.lowercase }}/cache

      # Push image to registry
    - name: Push To GHCR
      id: push
      if: github.event_name != 'pull_request'
      uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2.8
      with:
        image: ${{ steps.build_image.outputs.image }}
        tags: ${{ steps.build_image.outputs.tags }}
        username: ${{ github.actor }}
        password: ${{ github.token }}

      # Sign container
    - name: Log in to the Container registry
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ github.token }}
    - name: Install cosign
      uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1
    - name: Sign container image
      if: github.event_name != 'pull_request'
      run: |
        cosign sign -y --recursive --key env://COSIGN_PRIVATE_KEY ${{ steps.registry_case.outputs.lowercase }}/${{ inputs.image-name }}:${{ github.ref_name }}@${{ steps.push.outputs.digest }}
      env:
        COSIGN_EXPERIMENTAL: false
        COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
    - name: Echo outputs
      run: |
        echo "${{ toJSON(steps.push.outputs) }}"

  provenance:
    needs: [build_and_push_image]
    permissions:
      actions: read # for detecting the Github Actions environment.
      id-token: write # for creating OIDC tokens for signing.
      packages: write # for uploading attestations.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      image: ${{ needs.build_and_push_image.outputs.FULL_IMAGE_REF }}
      digest: ${{ needs.build_and_push_image.outputs.IMAGE_DIGEST }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}
